<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Source Memory Task (Part 2)</title>
    <script src="../revisitUtilities/revisit-communicate.js"></script>

    <style>
        /* --- 1. GLOBAL STYLES --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            font-size: 1.1em;
            text-align: center;
        }

        /* --- 2. PERSISTENT HEADER --- */
        .object-header {
            margin-bottom: 20px;
            position: relative;
            top: 0;
            background: #f8f9fa;
            padding: 10px;
            z-index: 10;
            width: 100%;
            font-size: 40px;
        }

        .object-header img {
            height: 75px;
            width: 75px;
            object-fit: contain;
        }

        /* --- 3. CARD LOOK --- */
        .question-container {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 30px;
            width: 100%;
            max-width: 700px;
            text-align: center;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 4. BUTTONS --- */
        button {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1em;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 10px;
        }

        button:hover:not(:disabled) { background-color: #1565c0; }
        button:disabled { background-color: #ccc; cursor: not-allowed; opacity: 0.6; }

        .choice-btn.selected {
            background-color: #0d47a1;
            box-shadow: inset 0 0 0 3px #82b1ff;
        }

        /* --- 5. LIKERT SCALE --- */
        .likert-container {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }

        .likert-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 16%;
            cursor: pointer;
        }

        .likert-text { font-size: 0.8em; margin-bottom: 8px; }

        .custom-radio {
            width: 20px;
            height: 20px;
            border: 2px solid #ccc;
            border-radius: 50%;
        }

        input:checked + .custom-radio {
            background-color: #333;
            border-color: #333;
            box-shadow: inset 0 0 0 4px white;
        }

        input { display: none; }

        /* --- 6. UTILS --- */
        .hidden { display: none !important; }
        .disabled-section { pointer-events: none; opacity: 0.7; }

        textarea {
            width: 90%;
            height: 80px;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="object-header">
    <img id="object-image" alt="Object">
    <div id="object-name-display" class="object-name"></div>
</div>

<div id="stage-retrieval" class="question-container">
    <h3>Choose an answer</h3>
    <div class="likert-container" style="justify-content: space-around;">
        <label class="likert-option"><span class="likert-text">This object was not in Part 1</span><input type="radio" name="retrievalAnswer" value="not_in_part_1" onchange="enableNext('btn-next-1')"><span class="custom-radio"></span></label>
        <label class="likert-option"><span class="likert-text">This object was real</span><input type="radio" name="retrievalAnswer" value="real" onchange="enableNext('btn-next-1')"><span class="custom-radio"></span></label>
        <label class="likert-option"><span class="likert-text">This object was virtual</span><input type="radio" name="retrievalAnswer" value="virtual" onchange="enableNext('btn-next-1')"><span class="custom-radio"></span></label>
    </div>
    <div class="nav-controls">
        <button id="btn-next-1" onclick="submitRetrieval()" disabled>Next</button>
    </div>
</div>

<div id="stage-confidence" class="question-container hidden">
    <h3>How confident are you?</h3>
    <div class="likert-container">
        <label class="likert-option"><span class="likert-text">0%</span><input type="radio" name="confidence" value="0" onchange="enableNext('btn-next-2')"><span class="custom-radio"></span></label>
        <label class="likert-option"><span class="likert-text">20%</span><input type="radio" name="confidence" value="20" onchange="enableNext('btn-next-2')"><span class="custom-radio"></span></label>
        <label class="likert-option"><span class="likert-text">40%</span><input type="radio" name="confidence" value="40" onchange="enableNext('btn-next-2')"><span class="custom-radio"></span></label>
        <label class="likert-option"><span class="likert-text">60%</span><input type="radio" name="confidence" value="60" onchange="enableNext('btn-next-2')"><span class="custom-radio"></span></label>
        <label class="likert-option"><span class="likert-text">80%</span><input type="radio" name="confidence" value="80" onchange="enableNext('btn-next-2')"><span class="custom-radio"></span></label>
        <label class="likert-option"><span class="likert-text">100%</span><input type="radio" name="confidence" value="100" onchange="enableNext('btn-next-2')"><span class="custom-radio"></span></label>
    </div>
    <div class="nav-controls">
        <button id="btn-next-2" onclick="submitConfidence()" disabled>Next</button>
    </div>
</div>

<div id="final-message" class="question-container hidden" style="border-left: 5px solid #28a745; background-color: #d4edda;">
    <h3 style="color: #155724;">Trial finished</h3>
    <p>Please click <strong>Next</strong> in the study interface to continue.</p>
</div>

<script>
    let trialFinished = false;
    document.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;

        if (trialFinished) {
            // Forward Enter to reVISit parent to trigger its Next button
            window.parent.document.dispatchEvent(
                new KeyboardEvent('keydown', { key: 'Enter', bubbles: true })
            );
            return;
        }

        // Stage 1 — retrieval
        const btn1 = document.getElementById('btn-next-1');
        if (!btn1.disabled && !btn1.classList.contains('hidden')) {
            submitRetrieval();
            return;
        }

        // Stage 2 — confidence
        const btn2 = document.getElementById('btn-next-2');
        if (!btn2.disabled && !btn2.classList.contains('hidden')) {
            submitConfidence();
            return;
        }
    });


    let trialAnswers = {
        objectName: "",
        retrievalAnswer: null,
        confidence: null
    };

    // Initialization
    if (typeof Revisit !== 'undefined') {
        Revisit.onDataReceive((data) => {
            if (data.imageFile) document.getElementById('object-image').src = data.imageFile;
            if (data.objectName) {
                document.getElementById('object-name-display').textContent = data.objectName;
                trialAnswers.objectName = data.objectName;
            }
        });
    } else {
        document.getElementById('object-image').src = "https://placehold.co/200x200?text=Object";
    }

    function enableNext(btnId) {
        document.getElementById(btnId).disabled = false;
    }

    function lockSection(sectionId) {
        const section = document.getElementById(sectionId);
        section.classList.add('disabled-section');
        const btn = section.querySelector('.nav-controls button');
        if (btn) btn.classList.add('hidden');
    }

    function submitRetrieval() {
        const selected = document.querySelector('input[name="retrievalAnswer"]:checked');
        trialAnswers.retrievalAnswer = selected ? selected.value : null;
        lockSection('stage-retrieval');
        document.getElementById('stage-confidence').classList.remove('hidden');
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function submitConfidence() {
        const selected = document.querySelector('input[name="confidence"]:checked');
        trialAnswers.confidence = selected ? selected.value : null;
        saveAndFinish();
    }

    function saveAndFinish() {
        trialFinished = true;
        
        // Hide the confidence stage entirely
        document.getElementById('stage-confidence').classList.add('hidden');
        
        // Post answers to reVISit → unlocks the outside Next button
        trialAnswers.completionSignal = "Finished";
        console.log('Trial finish posting answers', trialAnswers);
        if (typeof Revisit !== 'undefined') {
            Revisit.postAnswers({ ...trialAnswers });
        }
        document.getElementById('final-message').classList.remove('hidden');
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
